<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - ModuDoc</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body class="bg-gray-50 text-gray-800 flex h-screen overflow-hidden">

    <aside class="w-64 bg-gray-900 text-white flex flex-col">
        <div class="p-6 font-bold text-xl tracking-wider border-b border-gray-700">
            🤖 ModuDoc
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="/" class="block py-2.5 px-4 rounded transition hover:bg-gray-800 text-gray-400">새 변환 작업</a>
            <a href="/history" class="block py-2.5 px-4 rounded transition bg-gray-800">변환 이력</a>
            <a href="/compare" class="block py-2.5 px-4 rounded transition hover:bg-gray-800 text-gray-400">원본 비교 뷰어</a>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-6 border-b border-gray-200 bg-gray-50">
                <h2 class="text-2xl font-bold">작업 이력</h2>
            </div>
            
            <ul class="divide-y divide-gray-200">
                {% for item in history %}
                <li class="p-6 hover:bg-gray-50 transition">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500 mb-1">{{ item.date }}</p>
                            <p class="font-medium text-lg">{{ item.files | join(', ') }}</p>
                            <div class="flex space-x-2 mt-2">
                                <span class="bg-blue-100 text-blue-800 text-xs px-2.5 py-0.5 rounded font-semibold">{{ item.format }}</span>
                                <span class="bg-purple-100 text-purple-800 text-xs px-2.5 py-0.5 rounded">{{ item.model }}</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="text-green-600 font-semibold text-sm">완료됨</span>
                            <p class="text-xs text-gray-400 mt-1">./processed 폴더 확인</p>
                            <a href="/compare" class="inline-block mt-3 px-3 py-1.5 rounded border border-gray-300 text-sm text-gray-700 hover:bg-gray-100">원본 비교</a>
                        </div>
                    </div>
                </li>
                {% else %}
                <li class="p-8 text-center text-gray-500">
                    아직 변환된 파일이 없습니다.
                </li>
                {% endfor %}
            </ul>
        </div>
    </main>
</body>
</html>
